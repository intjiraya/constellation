<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>constellation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet">


<link rel="stylesheet" href="/static/vendor/xterm.min.css">
<script src="/static/vendor/xterm.min.js"></script>
<script src="/static/vendor/addon-fit.min.js"></script>
<script src="/static/vendor/addon-web-links.min.js"></script>

<script src="/static/vendor/purify.min.js"></script>
<script src="/static/vendor/marked.min.js"></script>
<script src="/static/vendor/hljs.core.min.js"></script>
<script src="/static/vendor/hljs.python.min.js"></script>
<script src="/static/vendor/hljs.javascript.min.js"></script>
<script src="/static/vendor/hljs.typescript.min.js"></script>
<script src="/static/vendor/hljs.bash.min.js"></script>
<script src="/static/vendor/hljs.json.min.js"></script>
<script src="/static/vendor/hljs.rust.min.js"></script>
<script src="/static/vendor/hljs.go.min.js"></script>
<script src="/static/vendor/hljs.yaml.min.js"></script>
<script src="/static/vendor/hljs.markdown.min.js"></script>

<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="app" id="app">

  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="/static/claude-logo.svg" alt="" width="18" height="18">
      <span>constellation</span>
    </div>
    <div class="sys" id="sys" title="">
      <span class="dot"></span>
      <span id="sys-text">connecting…</span>
    </div>
    <div class="search">
      <span class="ic">/</span>
      <input id="search" placeholder="search conversations…" autocomplete="off" spellcheck="false" />
      <span class="kbd">⌘K</span>
    </div>
    <div class="tb-actions">
      <button class="tb-btn" id="btn-new-chat" title="start a new claude session in the active project">+ new chat</button>
      <button class="tb-btn" id="btn-reindex" title="rescan ~/.claude/projects">↻ reindex</button>
    </div>
  </header>

  <nav class="rail" id="rail" aria-label="projects">
    <div class="r-section"><span>all</span><span id="all-count">—</span></div>
    <div class="r-item" data-project="*"><span class="name">recent</span><span class="n">∗</span></div>

    <div class="r-section"><span>projects</span><span id="proj-count">—</span></div>
    <div id="proj-list"></div>
  </nav>

  <section class="list" id="list">
    <div class="list-head">
      <div class="path" id="list-path">—</div>
      <div class="stats" id="list-stats"></div>
    </div>
    <div id="chat-list"></div>
  </section>

  <main class="stage" id="stage" data-mode="empty">

    <div class="stage-empty" id="stage-empty">
      <div class="hint">
        <div class="hint-title">Pick a conversation</div>
        <div class="hint-sub">Browse projects on the left, click any chat to preview it here.<br>Hit <span class="kbd">▶ resume</span> to continue in an embedded terminal.</div>
      </div>
    </div>

    <div class="stage-loaded" id="stage-loaded" style="display:none">
      <div class="stage-head">
        <div class="lhs">
          <div class="path" id="stage-path"></div>
          <div class="title" id="stage-title">—</div>
          <div class="meta-line" id="stage-meta"></div>
        </div>
        <div class="rhs">
          <button class="btn" id="btn-fork">⑂ fork</button>
          <button class="btn primary" id="btn-resume">▶ resume <span class="kbd">↵</span></button>
          <button class="btn" id="btn-close-term" style="display:none">× close terminal</button>
        </div>
      </div>

      <div class="scroll" id="preview"></div>

      <div class="terminal-wrap" id="terminal-wrap" style="display:none">
        <div id="terminal"></div>
      </div>
    </div>

  </main>

</div>

<script src="/static/app.js" type="module"></script>
</body>
</html>
