name: Bug report
description: Report something that works incorrectly.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can.
        Security issues -> do not file here, use the link from the issue picker.

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: cchats opens but the chat list is empty though `~/.claude/projects/` has sessions.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected the list to show every session under ~/.claude/projects/.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How can we reproduce it?
      description: Minimal steps. Include the command you ran.
      value: |
        1. `cchats`
        2. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: cchats version
      placeholder: "cchats 0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: "Arch Linux x86_64 / macOS 14 arm64 / Windows 11"
    validations:
      required: true

  - type: input
    id: rust
    attributes:
      label: Rust toolchain (if built from source)
      placeholder: "rustc 1.95.0"

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output of `cchats --log debug` (or relevant excerpt).
      render: shell
